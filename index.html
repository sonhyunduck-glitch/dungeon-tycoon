<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>탑아이들</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/enemies.css">
<link rel="stylesheet" href="css/enemies_phaseb.css">
<script>/* 네이티브 앱이면 클래스 추가 → 글래스 블러(backdrop-filter) 비활성(WebView 깜빡임 방지) */
try{ if(window.Capacitor && Capacitor.isNativePlatform && Capacitor.isNativePlatform()){ document.documentElement.classList.add("native-app"); } }catch(e){}</script>
</head>
<body>
<div id="app" class="app">

  <!-- 상단 HUD -->
  <header class="hud" id="hud">
    <div class="hud-name">🗡️ <span id="hud-floor">1층</span></div>
    <div class="hud-hpbar" title="HP">
      <div class="hud-hpfill" id="hud-hpfill"></div>
      <span class="hud-hptext" id="hud-hptext">100/100</span>
    </div>
    <div class="hud-stat">⚔️ <span id="hud-power">0</span></div>
    <div class="hud-stat gold">🪙 <span id="hud-gold">0</span></div>
  </header>

  <!-- 네비게이션 (위치는 CSS가 방향에 따라 조정) -->
  <nav class="nav" id="nav">
    <button class="nav-btn active" data-tab="dungeon"><span><img class="navico" src="assets/icon/button/1.png" alt=""></span><b>던전</b></button>
    <button class="nav-btn" data-tab="inventory"><span><img class="navico" src="assets/icon/button/2.png" alt=""></span><b>가방</b></button>
    <button class="nav-btn" data-tab="character"><span><img class="navico" src="assets/icon/button/3.png" alt=""></span><b>캐릭터</b></button>
    <button class="nav-btn" data-tab="shop"><span><img class="navico" src="assets/icon/button/4.png" alt=""></span><b>가판대</b></button>
    <button class="nav-btn" data-tab="vendor"><span><img class="navico" src="assets/icon/button/5.png" alt=""></span><b>상점</b></button>
    <button class="nav-btn" data-tab="arena"><span><img class="navico" src="assets/icon/button/6.png" alt=""></span><b>아레나</b></button>
    <button class="nav-btn" data-tab="ranking"><span><img class="navico" src="assets/icon/button/7.png" alt=""></span><b>랭킹</b></button>
    <button class="nav-btn" data-tab="settings"><span><img class="navico" src="assets/icon/button/8.png" alt=""></span><b>설정</b></button>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main class="main" id="main">
    <section class="view active" id="view-dungeon"></section>
    <section class="view" id="view-inventory"></section>
    <section class="view" id="view-character"></section>
    <section class="view" id="view-shop"></section>
    <section class="view" id="view-vendor"></section>
    <section class="view" id="view-arena"></section>
    <section class="view" id="view-ranking"></section>
    <section class="view" id="view-settings"></section>
  </main>

  <!-- 로그 (가로모드에서 우측 고정, 세로모드에서 하단) -->
  <aside class="logpanel" id="logpanel">
    <div class="logpanel-title">📜 기록</div>
    <div class="logpanel-body" id="log"></div>
  </aside>

</div>

<!-- 채팅 플로팅 버튼 (하단 nav 바로 위, 우측 끝) -->
<button id="chat-fab" class="chat-fab" data-act="open-chat" title="모험가 채팅">💬</button>

<div id="hurt-vignette"></div>
<div id="win-flash"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="js/supa_config.js"></script>
<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/avatars.js"></script>
<script src="js/sprite_foot.js"></script>
<script src="js/state.js"></script>
<script src="js/item.js"></script>
<script src="js/combat.js"></script>
<script src="js/dungeon.js"></script>
<script src="js/inventory.js"></script>
<script src="js/shop.js"></script>
<script src="js/craft.js"></script>
<script src="js/perks.js"></script>
<script src="js/ranking.js"></script>
<script src="js/net.js"></script>
<script src="js/arena.js"></script>
<script src="js/gacha.js"></script>
<script src="js/chat.js"></script>
<script src="js/ui.js"></script>
<script src="js/ui-fx.js"></script>
<script src="js/ui-combat.js"></script>
<script src="js/ui-modals.js"></script>
<script src="js/ui-tabs.js"></script>
<script src="js/ui-inventory.js"></script>
<script src="js/ui-character.js"></script>
<script src="js/ui-shop.js"></script>
<script src="js/ui-vendor.js"></script>
<script src="js/ui-perks.js"></script>
<script src="js/ui-arena.js"></script>
<script src="js/ui-ranking.js"></script>
<script src="js/save.js"></script>
<script src="js/audio.js"></script>
<script src="js/main.js"></script>
<script src="js/emoji.js"></script>
</body>
</html>
